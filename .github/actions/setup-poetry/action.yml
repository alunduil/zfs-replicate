name: Set up Poetry
description: Install Poetry and Python for a given version, with Poetry's download cache.

# Sets up the toolchain only. Jobs that run project code run `poetry install`
# themselves; jobs that only build or check (poetry build, poetry check) skip it.
#
# A local composite action cannot run actions/checkout: the caller must
# check out the repository before this action's file exists on disk. Callers
# run actions/checkout first, then invoke this action.
inputs:
  python-version:
    description: Python version passed to actions/setup-python.
    required: true

runs:
  using: composite
  steps:
    - name: install poetry
      shell: bash
      run: pipx install 'poetry<3'
    - name: setup python-${{ inputs.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ inputs.python-version }}
        cache: poetry
