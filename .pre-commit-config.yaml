# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
default_install_hook_types:
  - pre-commit
  - commit-msg
ci:
  autofix_prs: false
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: destroyed-symlinks
      - id: check-ast
      - id: check-builtin-literals
      - id: check-docstring-first
      - id: debug-statements
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-merge-conflict
      - id: check-vcs-permalinks
      - id: check-toml
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        args:
          - --fix
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        additional_dependencies:
          - types-requests
          - types-retry
          - types-toml
  - repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
    rev: v2.15.0
    hooks:
      - id: pretty-format-toml
        args: [--autofix]
        exclude: poetry\.lock
  - repo: https://github.com/tweag/FawltyDeps
    rev: v0.13.1
    hooks:
      - id: check
        args:
          - --detailed
  - repo: https://github.com/errata-ai/vale
    rev: v3.13.0
    hooks:
      - id: vale
        exclude: '^(styles/|LICENSE$|\.envrc$)'
        exclude_types:
          - gitignore
          - ini
          - json
          - nix
          - python
          - shell
          - toml
          - yaml
  # Advisory local mirror of the Semantic Pull Request workflow: catches a bad
  # type at commit time. commit-msg stage keeps it out of `pre-commit run`, so
  # it never becomes a CI gate and stays bypassable (--no-verify). Keep the
  # type list in sync with that workflow and CONTRIBUTING.
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages:
          - commit-msg
        args:
          - feat
          - fix
          - perf
          - refactor
          - docs
          - test
          - build
          - ci
          - chore
          - revert
